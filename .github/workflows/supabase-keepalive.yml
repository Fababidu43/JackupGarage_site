name: supabase-keepalive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run 30s interval test loop"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_duration_minutes:
        description: "Test duration in minutes when test_mode=true"
        required: false
        default: "5"
        type: string

jobs:
  ping:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.test_mode != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Upsert single keepalive row (id=1)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

          endpoint="$SUPABASE_URL/rest/v1/keepalive?on_conflict=id"
          touched_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          payload="{\"id\":1,\"touched_at\":\"$touched_at\"}"
          echo "Upserting keepalive id=1 at $touched_at"

          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "$endpoint" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$payload")

          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)

          echo "HTTP $code"
          echo "Body: $body"

          if [ "$code" != "201" ] && [ "$code" != "200" ]; then
            echo "Upsert failed with HTTP $code"
            exit 1
          fi

  ping_test_30s:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Upsert keepalive row every 30 seconds (test mode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_DURATION_MINUTES: ${{ github.event.inputs.test_duration_minutes }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

          endpoint="$SUPABASE_URL/rest/v1/keepalive?on_conflict=id"
          duration_min=${TEST_DURATION_MINUTES:-5}
          duration_sec=$((duration_min * 60))
          iterations=$((duration_sec / 30))

          if [ "$iterations" -lt 1 ]; then
            iterations=1
          fi

          echo "Starting test mode: $iterations upserts, every 30s"
          echo "Endpoint: $endpoint"

          i=1
          while [ "$i" -le "$iterations" ]; do
            touched_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload="{\"id\":1,\"touched_at\":\"$touched_at\"}"

            response=$(curl -s -w "\n%{http_code}" \
              -X POST \
              "$endpoint" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=representation" \
              -d "$payload")

            body=$(echo "$response" | head -n -1)
            code=$(echo "$response" | tail -n 1)

            echo "[$i/$iterations] HTTP $code"
            echo "[$i/$iterations] Body: $body"

            if [ "$code" != "201" ] && [ "$code" != "200" ]; then
              echo "Upsert failed with HTTP $code"
              exit 1
            fi

            if [ "$i" -lt "$iterations" ]; then
              sleep 30
            fi

            i=$((i + 1))
          done

          echo "30-second upsert test completed successfully"
